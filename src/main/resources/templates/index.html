<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Movie Catalogue</title>
</head>

<body>

    <!-- Insert header fragment here -->
    <div th:replace="fragments/header :: siteHeader"></div>

    <div class="container">
        <h2 th:text="${#strings.isEmpty(query)} ? 'Trending this week' : 'Search results for \'' + ${query} + '\''">
            Trending this week
        </h2>


        <!-- Message if TMDb is unreachable -->
        <div th:if="${movies == null}" style="padding:12px; border:1px dashed #555; background:#f8f9fa; color:#333;">
            Could not load data from TMDb. Please check your API key.
        </div>

        <!-- Message if TMDb returns no results -->
        <div th:if="${movies != null and #lists.isEmpty(movies)}"
            style="padding:12px; border:1px dashed #555; background:#f8f9fa; color:#333;">
            No movies found.
        </div>

        <!-- Movie grid -->
        <div th:if="${movies != null}"
            style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:16px;">
            <div th:each="m : ${movies}"
                style="border:1px solid #ccc; border-radius:8px; overflow:hidden; background:#fff;">
                <img th:if="${m.poster_path != null}" th:src="${imgBase + m.poster_path}" th:alt="${m.title}"
                    style="width:100%; display:block; aspect-ratio:2/3; object-fit:cover; background:#eee;">
                <div style="padding:8px;">
                    <strong th:text="${m.title}">Title</strong>
                    <div th:text="${m.release_date}" style="font-size:12px; color:#666;">YYYY-MM-DD</div>
                    <div style="margin-top:8px;">
                        <a th:href="@{'/movie/' + ${m.id}}">Details</a>

                        <form th:action="@{/favorites/add}" method="post" style="margin:0">
                            <input type="hidden" name="tmdbId" th:value="${m.id}">
                            <input type="hidden" name="title" th:value="${m.title}">
                            <input type="hidden" name="posterPath" th:value="${m.poster_path}">
                            <input type="hidden" name="rating" th:value="${m.vote_average}">
                            <input type="hidden" name="releaseDate" th:value="${m.release_date}">
                            <input type="hidden" name="overview" th:value="${m.overview}">
                            <input type="hidden" name="redirect" value="/">
                            <button type="submit"
                                style="padding:6px 10px; border:1px solid #ccc; border-radius:8px; background:#f3f4f6; cursor:pointer">
                                + Favorite
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
