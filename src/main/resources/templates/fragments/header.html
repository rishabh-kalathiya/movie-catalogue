<div th:fragment="siteHeader">
  <!-- Global dark theme + utility styles -->
  <style>
    :root {
      --bg: #0f172a;
      /* slate-900 */
      --bg-card: #111827;
      /* gray-900 */
      --text: #88888a;
      /* gray-200 */
      --muted: #9ca3af;
      /* gray-400 */
      --accent: #2563eb;
      /* blue-600 */
      --danger: #ef4444;
      /* red-500 */
      --gold: #f59e0b;
      /* amber-500 */
      --border: #1f2937;
      /* gray-800 */
      --btn-bg: #0b1220;
      --btn-bg-hover: #0f172a;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
    }

    a {
      color: var(--text);
      text-decoration: none;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    .muted {
      color: var(--muted);
    }

    header.nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-links a {
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 10px;
    }

    .nav-links a:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    .search {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search input {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--btn-bg);
      color: var(--text);
      width: 260px;
    }

    .btn {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
    }

    .btn:hover {
      background: var(--btn-bg-hover);
    }

    .btn-primary {
      border-color: var(--accent);
    }

    .btn-danger {
      background: #1a0b0b;
      border-color: #7f1d1d;
    }

    .btn-gold {
      background: #181204;
      border-color: #a16207;
      color: var(--gold);
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-card);
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill-link {
      background: gold;
      color: black;
      padding: 8px 12px;
      border-radius: 8px;
      display: inline-block;
    }
  </style>

  <header class="nav">
    <div class="brand">
      <strong><a th:href="@{/}">🎬 Movie Catalogue</a></strong>
      <nav class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/favorites}">Favorites</a>
        <a th:href="@{/highlights}" style="color:var(--gold)">⭐ Highlights</a>
      </nav>
    </div>

    <!-- Search form -->
    <form class="search" th:action="@{/search}" method="get">
      <input type="text" name="q" th:value="${query}" placeholder="Search movies…">
      <button type="submit" class="btn btn-primary">Search</button>
    </form>
  </header>
</div>
