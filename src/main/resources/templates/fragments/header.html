<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="siteHeader">
  <header style="display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px 16px;border-bottom:1px solid #ddd">
    <div style="display:flex;gap:12px;align-items:center">
      <strong><a th:href="@{/}" style="text-decoration:none">🎬 Movie Catalogue</a></strong>
      <nav style="display:flex;gap:12px">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/favorites}">Favorites</a>
      </nav>
    </div>

    <!-- Search form -->
    <form th:action="@{/search}" method="get" style="display:flex;gap:8px;align-items:center">
      <input type="text" name="q" th:value="${query}" placeholder="Search movies…"
             style="padding:8px 10px;border:1px solid #ccc;border-radius:8px;width:260px">
      <button type="submit" style="padding:8px 12px;border:1px solid #ccc;border-radius:8px;background:#f3f4f6;cursor:pointer">
        Search
      </button>
    </form>
  </header>
</div>

</body>
</html>
